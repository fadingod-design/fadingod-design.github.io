<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindQuant · 智能金融</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: #111113;
            --surface-2: #18181b;
            --border: rgba(255,255,255,0.06);
            --text: #fafafa;
            --text-2: #a1a1aa;
            --text-3: #52525b;
            --accent: #f97316;
            --accent-glow: rgba(249,115,22,0.15);
            --green: #22c55e;
            --red: #ef4444;
        }
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Subtle noise texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.02;
            pointer-events: none;
            z-index: 0;
        }
        
        /* Ambient gradient orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            animation: float 20s ease-in-out infinite;
        }
        .orb-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(34,197,94,0.05) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            animation: float 25s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }
        
        /* Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 0;
            background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
        }
        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), #fb923c);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            color: var(--accent);
        }
        
        nav {
            display: flex;
            gap: 32px;
        }
        nav a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        nav a:hover { color: var(--text); }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-2);
        }
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        /* Hero */
        .hero {
            padding: 160px 0 80px;
            text-align: center;
        }
        .hero-eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: var(--accent-glow);
            border: 1px solid rgba(249,115,22,0.2);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .hero-title {
            font-size: clamp(40px, 8vw, 72px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -2px;
            margin-bottom: 20px;
        }
        .hero-title .gradient {
            background: linear-gradient(135deg, var(--accent), #fb923c, #fdba74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .hero-subtitle {
            font-size: 18px;
            color: var(--text-2);
            max-width: 500px;
            margin: 0 auto 40px;
            line-height: 1.6;
        }
        
        /* Ticker */
        .ticker-wrapper {
            overflow: hidden;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            padding: 16px 0;
            margin: 60px 0;
        }
        .ticker {
            display: flex;
            gap: 60px;
            animation: scroll 30s linear infinite;
            white-space: nowrap;
        }
        .ticker-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ticker-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-3);
        }
        .ticker-price {
            font-size: 14px;
            font-weight: 600;
        }
        .ticker-change {
            font-size: 12px;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .ticker-change.up {
            color: var(--green);
            background: rgba(34,197,94,0.1);
        }
        .ticker-change.down {
            color: var(--red);
            background: rgba(239,68,68,0.1);
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* Section */
        .section {
            margin: 80px 0;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .section-meta {
            font-size: 13px;
            color: var(--text-3);
        }
        
        /* Grid */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .grid-3 { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
        }
        
        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        .card:hover {
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-2);
        }
        .card-value {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1px;
        }
        .card-change {
            font-size: 14px;
            font-weight: 500;
        }
        .card-change.up { color: var(--green); }
        .card-change.down { color: var(--red); }
        
        /* Index Card */
        .index-card {
            text-align: center;
            cursor: pointer;
        }
        .index-name {
            font-size: 13px;
            color: var(--text-3);
            margin-bottom: 8px;
        }
        .index-price {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .index-change {
            font-size: 13px;
            font-weight: 500;
        }
        
        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        th:last-child, td:last-child {
            text-align: right;
        }
        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        tr:hover td {
            background: rgba(255,255,255,0.02);
        }
        .stock-name {
            font-weight: 500;
        }
        .stock-code {
            font-size: 12px;
            color: var(--text-3);
            font-family: 'JetBrains Mono', monospace;
        }
        .price {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .change-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }
        .change-badge.up {
            color: var(--green);
            background: rgba(34,197,94,0.1);
        }
        .change-badge.down {
            color: var(--red);
            background: rgba(239,68,68,0.1);
        }
        
        /* Tab */
        .tabs {
            display: flex;
            gap: 4px;
            background: var(--surface-2);
            padding: 4px;
            border-radius: 10px;
            width: fit-content;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            background: var(--surface);
            color: var(--text);
        }
        
        /* AI Signal */
        .signal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--surface-2);
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .signal-item:last-child { margin-bottom: 0; }
        .signal-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .signal-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .signal-icon.buy {
            background: rgba(34,197,94,0.1);
        }
        .signal-icon.caution {
            background: rgba(234,179,8,0.1);
        }
        .signal-label {
            font-weight: 500;
            margin-bottom: 2px;
        }
        .signal-stock {
            font-size: 13px;
            color: var(--text-3);
        }
        .signal-score {
            font-size: 18px;
            font-weight: 700;
        }
        .signal-score.buy { color: var(--green); }
        .signal-score.caution { color: #eab308; }
        
        /* Stats */
        .stat-item {
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
        }
        .stat-item:last-child { border-bottom: none; }
        .stat-label {
            font-size: 13px;
            color: var(--text-3);
            margin-bottom: 4px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: 600;
        }
        
        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 40px 0;
            margin-top: 80px;
            text-align: center;
            color: var(--text-3);
            font-size: 13px;
        }
        
        /* Chart placeholder */
        .chart-placeholder {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            font-size: 14px;
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Ambient orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <!-- Header -->
    <header>
        <div class="container header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                <span class="logo-text">Wind<span>Quant</span></span>
            </div>
            <nav>
                <a href="#markets">市场</a>
                <a href="#stocks">股票</a>
                <a href="#signals">信号</a>
            </nav>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>实时数据</span>
            </div>
        </div>
    </header>
    
    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <div class="hero-eyebrow">
                <span>智能 · 实时 · 专业</span>
            </div>
            <h1 class="hero-title">
                让投资决策<br>
                <span class="gradient">更有智慧</span>
            </h1>
            <p class="hero-subtitle">
                基于先进 AI 算法，整合海量金融数据，为您提供机构级量化分析服务
            </p>
        </div>
    </section>
    
    <!-- Ticker -->
    <div class="ticker-wrapper">
        <div class="ticker" id="ticker">
            <span class="ticker-item">
                <span class="ticker-name">上证指数</span>
                <span class="ticker-price">--</span>
                <span class="ticker-change up">--+%</span>
            </span>
        </div>
    </div>
    
    <!-- Main Content -->
    <main class="container">
        <!-- Indices -->
        <section class="section" id="markets">
            <div class="section-header">
                <h2 class="section-title">主要指数</h2>
                <span class="section-meta" id="updateTime">加载中...</span>
            </div>
            <div class="grid-4" id="indicesGrid">
                <div class="card index-card"><div class="loading"><div class="spinner"></div></div></div>
                <div class="card index-card"><div class="loading"><div class="spinner"></div></div></div>
                <div class="card index-card"><div class="loading"><div class="spinner"></div></div></div>
                <div class="card index-card"><div class="loading"><div class="spinner"></div></div></div>
            </div>
        </section>
        
        <!-- Stocks & Signals -->
        <div class="grid-2" style="gap: 24px;">
            <!-- Stocks Table -->
            <section class="section" id="stocks">
                <div class="section-header">
                    <h2 class="section-title">实时行情</h2>
                    <div class="tabs">
                        <button class="tab active" onclick="switchTab(this, 'cn')">A股</button>
                        <button class="tab" onclick="switchTab(this, 'us')">美股</button>
                    </div>
                </div>
                <div class="card">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>名称</th>
                                    <th>最新价</th>
                                    <th>涨跌幅</th>
                                </tr>
                            </thead>
                            <tbody id="stocksTable">
                                <tr><td colspan="3" class="loading"><div class="spinner"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
            
            <!-- AI Signals -->
            <section class="section" id="signals">
                <div class="section-header">
                    <h2 class="section-title">AI 智能信号</h2>
                </div>
                <div class="card">
                    <div id="signalsList">
                        <div class="signal-item">
                            <div class="signal-left">
                                <div class="signal-icon buy">📈</div>
                                <div>
                                    <div class="signal-label">强烈买入</div>
                                    <div class="signal-stock">上证指数</div>
                                </div>
                            </div>
                            <div class="signal-score buy">95</div>
                        </div>
                        <div class="signal-item">
                            <div class="signal-left">
                                <div class="signal-icon caution">⚡</div>
                                <div>
                                    <div class="signal-label">注意回调</div>
                                    <div class="signal-stock">创业板</div>
                                </div>
                            </div>
                            <div class="signal-score caution">68</div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        
        <!-- Market Stats -->
        <section class="section">
            <div class="grid-3">
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">市场情绪</span>
                    </div>
                    <div class="card-value" style="color: var(--green);">偏多</div>
                    <div class="card-change up">热度 72%</div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">资金流向</span>
                    </div>
                    <div class="card-value" style="color: var(--accent);">净流入</div>
                    <div class="card-change" style="color: var(--text-2);">+12.5亿</div>
                </div>
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">波动率指数</span>
                    </div>
                    <div class="card-value">14.28</div>
                    <div class="card-change" style="color: var(--text-2);">VIX</div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- Footer -->
    <footer>
        <div class="container">
            <p>WindQuant · 数据来源：新浪财经 · 仅供学习参考，不构成投资建议</p>
        </div>
    </footer>
    
    <script>
        const API_BASE = window.location.port === '5000' ? 'http://localhost:5000' : '';
        let currentTab = 'cn';
        
        // Demo data
        const DEMO = {
            indices: [
                {name: '上证指数', price: 3285.67, change: -15.34, changePercent: -0.46},
                {name: '深证成指', price: 10542.78, change: 28.12, changePercent: 0.27},
                {name: '创业板', price: 1982.45, change: 12.67, changePercent: 0.64},
                {name: '沪深300', price: 3825.34, change: -8.92, changePercent: -0.23}
            ],
            stocksCn: [
                {name: '招商银行', code: '600036', price: 39.94, change: 0.28, changePercent: 0.71},
                {name: '中国平安', code: '601318', price: 58.71, change: 0.15, changePercent: 0.26},
                {name: '宁德时代', code: '300750', price: 450.14, change: 19.14, changePercent: 4.44},
                {name: '比亚迪', code: '002594', price: 268.50, change: 11.02, changePercent: 4.28},
                {name: '贵州茅台', code: '600519', price: 1688.00, change: -12.50, changePercent: -0.74}
            ],
            stocksUs: [
                {name: '苹果', ticker: 'AAPL', price: 266.43, change: 2.94, changePercent: 1.12},
                {name: '英伟达', ticker: 'NVDA', price: 198.87, change: 1.20, changePercent: 0.61},
                {name: '特斯拉', ticker: 'TSLA', price: 391.95, change: 7.62, changePercent: 1.98},
                {name: '谷歌', ticker: 'GOOGL', price: 337.12, change: 1.26, changePercent: 0.38},
                {name: '微软', ticker: 'MSFT', price: 411.22, change: 4.61, changePercent: 1.13}
            ]
        };
        
        async function fetchAPI(url) {
            try {
                const res = await fetch(API_BASE + url);
                return await res.json();
            } catch { return null; }
        }
        
        function fmt(n, d = 2) {
            return n.toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d });
        }
        
        async function loadIndices() {
            const data = await fetchAPI('/api/indices/cn');
            const list = data?.length ? data : DEMO.indices;
            document.getElementById('indicesGrid').innerHTML = list.map(item => `
                <div class="card index-card">
                    <div class="index-name">${item.name}</div>
                    <div class="index-price">${fmt(item.price)}</div>
                    <div class="index-change ${item.change >= 0 ? 'up' : 'down'}" style="color: ${item.change >= 0 ? 'var(--green)' : 'var(--red)'}">
                        ${item.change >= 0 ? '+' : ''}${fmt(item.change)} (${item.change >= 0 ? '+' : ''}${item.changePercent.toFixed(2)}%)
                    </div>
                </div>
            `).join('');
        }
        
        async function loadTicker() {
            const data = await fetchAPI('/api/ticker');
            if (!data?.length) return;
            const items = data.map(item => `
                <span class="ticker-item">
                    <span class="ticker-name">${item.name}</span>
                    <span class="ticker-price">${fmt(item.price)}</span>
                    <span class="ticker-change ${item.change >= 0 ? 'up' : 'down'}">${item.change >= 0 ? '+' : ''}${item.changePercent?.toFixed(2) || 0}%</span>
                </span>
            `).join('');
            document.getElementById('ticker').innerHTML = items + items;
        }
        
        async function loadStocks(tab) {
            const url = tab === 'cn' ? '/api/stocks/cn' : '/api/stocks/us';
            const data = await fetchAPI(url);
            const list = data?.length ? data : (tab === 'cn' ? DEMO.stocksCn : DEMO.stocksUs);
            document.getElementById('stocksTable').innerHTML = list.map(item => `
                <tr>
                    <td>
                        <div class="stock-name">${item.name}</div>
                        <div class="stock-code">${item.code || item.ticker}</div>
                    </td>
                    <td class="price">${fmt(item.price)}</td>
                    <td>
                        <span class="change-badge ${item.change >= 0 ? 'up' : 'down'}">
                            ${item.change >= 0 ? '+' : ''}${item.changePercent.toFixed(2)}%
                        </span>
                    </td>
                </tr>
            `).join('');
        }
        
        function switchTab(btn, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = tab;
            loadStocks(tab);
        }
        
        async function refresh() {
            await Promise.all([loadIndices(), loadTicker(), loadStocks(currentTab)]);
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit', second: '2-digit'});
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            refresh();
            if (API_BASE) setInterval(refresh, 30000);
        });
    </script>
</body>
</html>
