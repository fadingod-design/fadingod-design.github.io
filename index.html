<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WindQuant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #161618;
            --surface-2: #1c1c1f;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.12);
            --text: #f0f0f0;
            --text-2: #8a8a8e;
            --text-3: #5c5c5e;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,0.08);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.08);
            --accent: #3b82f6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: rgba(13,13,15,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }
        
        .header-inner {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--accent), #60a5fa);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 16px;
            height: 16px;
            color: white;
        }
        
        .nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .nav a {
            color: var(--text-2);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav a:hover, .nav a.active {
            color: var(--text);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--green);
        }
        
        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .clock {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            font-variant-numeric: tabular-nums;
        }
        
        /* Main */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 80px 24px 40px;
        }
        
        /* Market Bar */
        .market-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        @media (max-width: 768px) {
            .market-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .market-item {
            background: var(--surface);
            padding: 16px 20px;
        }
        
        .market-item-label {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 4px;
        }
        
        .market-item-value {
            font-size: 18px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            margin-bottom: 2px;
        }
        
        .market-item-change {
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        
        .up { color: var(--green); }
        .down { color: var(--red); }
        
        /* Section */
        .section {
            margin-bottom: 24px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
        }
        
        .section-meta {
            font-size: 12px;
            color: var(--text-3);
        }
        
        /* Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 24px;
        }
        
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        
        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text);
        }
        
        .card-body {
            padding: 0;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 2px;
            background: var(--surface-2);
            padding: 3px;
            border-radius: 8px;
        }
        
        .tab {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            background: transparent;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab:hover {
            color: var(--text);
        }
        
        .tab.active {
            background: var(--surface);
            color: var(--text);
        }
        
        /* Table */
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .table th {
            text-align: left;
            padding: 12px 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-3);
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }
        
        .table th:last-child {
            text-align: right;
        }
        
        .table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }
        
        .table tr:last-child td {
            border-bottom: none;
        }
        
        .table tr:hover td {
            background: rgba(255,255,255,0.01);
        }
        
        .table td:last-child {
            text-align: right;
        }
        
        .stock-name {
            font-weight: 500;
            color: var(--text);
        }
        
        .stock-code {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }
        
        .price {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        
        .change {
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        
        .change-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
        }
        
        .change-badge.up {
            color: var(--green);
            background: var(--green-bg);
        }
        
        .change-badge.down {
            color: var(--red);
            background: var(--red-bg);
        }
        
        /* Signal */
        .signal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        
        .signal-item:last-child {
            border-bottom: none;
        }
        
        .signal-item:hover {
            background: rgba(255,255,255,0.01);
        }
        
        .signal-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        
        .signal-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .signal-icon.buy {
            background: var(--green-bg);
        }
        
        .signal-icon.hold {
            background: rgba(234,179,8,0.08);
        }
        
        .signal-label {
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .signal-label.buy { color: var(--green); }
        .signal-label.hold { color: #eab308; }
        
        .signal-stock {
            font-size: 13px;
            color: var(--text-3);
        }
        
        .signal-score {
            font-size: 24px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        
        .signal-score.buy { color: var(--green); }
        .signal-score.hold { color: #eab308; }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1px;
            background: var(--border);
        }
        
        .stat-item {
            background: var(--surface);
            padding: 16px 20px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-3);
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }
        
        /* Footer */
        .footer {
            max-width: 1400px;
            margin: 40px auto 0;
            padding: 20px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-3);
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-3);
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                    </svg>
                </div>
                WindQuant
            </div>
            <nav class="nav">
                <a href="#" class="active">市场</a>
                <a href="#">股票</a>
                <a href="#">资讯</a>
            </nav>
            <div class="header-right">
                <div class="live-badge">
                    <span class="live-dot"></span>
                    实时
                </div>
                <div class="clock" id="clock">--:--:--</div>
            </div>
        </div>
    </header>
    
    <!-- Main -->
    <main class="main">
        <!-- Market Bar -->
        <div class="market-bar" id="marketBar">
            <div class="market-item">
                <div class="market-item-label">上证指数</div>
                <div class="market-item-value" id="idx0">--</div>
                <div class="market-item-change" id="idx0c">--</div>
            </div>
            <div class="market-item">
                <div class="market-item-label">深证成指</div>
                <div class="market-item-value" id="idx1">--</div>
                <div class="market-item-change" id="idx1c">--</div>
            </div>
            <div class="market-item">
                <div class="market-item-label">创业板</div>
                <div class="market-item-value" id="idx2">--</div>
                <div class="market-item-change" id="idx2c">--</div>
            </div>
            <div class="market-item">
                <div class="market-item-label">沪深300</div>
                <div class="market-item-value" id="idx3">--</div>
                <div class="market-item-change" id="idx3c">--</div>
            </div>
            <div class="market-item">
                <div class="market-item-label">科创50</div>
                <div class="market-item-value" id="idx4">--</div>
                <div class="market-item-change" id="idx4c">--</div>
            </div>
        </div>
        
        <!-- Content -->
        <div class="content-grid">
            <!-- Left -->
            <div>
                <!-- Stocks Table -->
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">实时行情</h2>
                        <div class="tabs">
                            <button class="tab active" onclick="switchTab(this, 'cn')">A股</button>
                            <button class="tab" onclick="switchTab(this, 'us')">美股</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>名称 / 代码</th>
                                        <th>最新价</th>
                                        <th>涨跌幅</th>
                                    </tr>
                                </thead>
                                <tbody id="stocksTable">
                                    <tr><td colspan="3" class="loading"><div class="spinner"></div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Right -->
            <div>
                <!-- AI Signals -->
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">AI 智能信号</h2>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <div class="signal-item">
                                <div class="signal-left">
                                    <div class="signal-icon buy">📈</div>
                                    <div>
                                        <div class="signal-label buy">强烈买入</div>
                                        <div class="signal-stock">上证指数</div>
                                    </div>
                                </div>
                                <div class="signal-score buy">95</div>
                            </div>
                            <div class="signal-item">
                                <div class="signal-left">
                                    <div class="signal-icon buy">💎</div>
                                    <div>
                                        <div class="signal-label buy">价值发现</div>
                                        <div class="signal-stock">宁德时代 300750</div>
                                    </div>
                                </div>
                                <div class="signal-score buy">88</div>
                            </div>
                            <div class="signal-item">
                                <div class="signal-left">
                                    <div class="signal-icon hold">⚡</div>
                                    <div>
                                        <div class="signal-label hold">注意回调</div>
                                        <div class="signal-stock">创业板</div>
                                    </div>
                                </div>
                                <div class="signal-score hold">68</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Stats -->
                <div class="section">
                    <div class="section-header">
                        <h2 class="section-title">市场统计</h2>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">上涨</div>
                            <div class="stat-value up" id="statUp">--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">下跌</div>
                            <div class="stat-value down" id="statDown">--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">成交额</div>
                            <div class="stat-value" id="statVol">--</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">VIX</div>
                            <div class="stat-value">14.28</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div>WindQuant · 数据来源：新浪财经</div>
        <div id="updateTime">--</div>
    </footer>
    
    <script>
        const API = window.location.port === '5000' ? 'http://localhost:5000' : '';
        let currentTab = 'cn';
        
        const DEMO = {
            indices: [
                {name: '上证指数', price: 3285.67, change: -15.34, changePercent: -0.46},
                {name: '深证成指', price: 10542.78, change: 28.12, changePercent: 0.27},
                {name: '创业板', price: 1982.45, change: 12.67, changePercent: 0.64},
                {name: '沪深300', price: 3825.34, change: -8.92, changePercent: -0.23},
                {name: '科创50', price: 785.32, change: -5.23, changePercent: -0.66}
            ],
            stocksCn: [
                {name: '招商银行', code: '600036', price: 39.94, change: 0.28, changePercent: 0.71},
                {name: '中国平安', code: '601318', price: 58.71, change: 0.15, changePercent: 0.26},
                {name: '宁德时代', code: '300750', price: 450.14, change: 19.14, changePercent: 4.44},
                {name: '比亚迪', code: '002594', price: 268.50, change: 11.02, changePercent: 4.28},
                {name: '贵州茅台', code: '600519', price: 1688.00, change: -12.50, changePercent: -0.74}
            ],
            stocksUs: [
                {name: '苹果', ticker: 'AAPL', price: 266.43, change: 2.94, changePercent: 1.12},
                {name: '英伟达', ticker: 'NVDA', price: 198.87, change: 1.20, changePercent: 0.61},
                {name: '特斯拉', ticker: 'TSLA', price: 391.95, change: 7.62, changePercent: 1.98},
                {name: '谷歌', ticker: 'GOOGL', price: 337.12, change: 1.26, changePercent: 0.38},
                {name: '微软', ticker: 'MSFT', price: 411.22, change: 4.61, changePercent: 1.13}
            ]
        };
        
        async function fetchAPI(url) {
            try {
                const res = await fetch(API + url);
                return await res.json();
            } catch { return null; }
        }
        
        function fmt(n, d = 2) {
            return n.toLocaleString('zh-CN', { minimumFractionDigits: d, maximumFractionDigits: d });
        }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN');
        }
        
        async function loadIndices() {
            const data = await fetchAPI('/api/indices/cn');
            const list = data?.length ? data : DEMO.indices;
            list.forEach((item, i) => {
                const p = document.getElementById(`idx${i}`);
                const c = document.getElementById(`idx${i}c`);
                if (p) {
                    p.textContent = fmt(item.price);
                    const isUp = item.change >= 0;
                    c.innerHTML = `<span class="${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${fmt(item.change)} (${isUp ? '+' : ''}${item.changePercent.toFixed(2)}%)</span>`;
                }
            });
        }
        
        async function loadStocks(tab) {
            const url = tab === 'cn' ? '/api/stocks/cn' : '/api/stocks/us';
            const data = await fetchAPI(url);
            const list = data?.length ? data : (tab === 'cn' ? DEMO.stocksCn : DEMO.stocksUs);
            document.getElementById('stocksTable').innerHTML = list.map(item => `
                <tr>
                    <td>
                        <div class="stock-name">${item.name}</div>
                        <div class="stock-code">${item.code || item.ticker}</div>
                    </td>
                    <td><span class="price">${fmt(item.price)}</span></td>
                    <td><span class="change-badge ${item.change >= 0 ? 'up' : 'down'}">${item.change >= 0 ? '+' : ''}${item.changePercent.toFixed(2)}%</span></td>
                </tr>
            `).join('');
        }
        
        function switchTab(btn, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            currentTab = tab;
            loadStocks(tab);
        }
        
        async function refresh() {
            await Promise.all([loadIndices(), loadStocks(currentTab)]);
            document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleTimeString('zh-CN');
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            updateClock();
            setInterval(updateClock, 1000);
            refresh();
            if (API) setInterval(refresh, 30000);
        });
    </script>
</body>
</html>
